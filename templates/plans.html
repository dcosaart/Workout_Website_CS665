<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plans</title>
</head>
<body>
    <script>
        function viewPlan(id) {
            window.location.href = `/plans/viewplan/${id}`;
        }
        function addPlan() {
            window.location.href = `/plans/add`;
        }
    </script>
    <h1>All Plans</h1>

    {% if plans %}


    {% for plan in plans %}
    <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
        <h2>{{plan.user_name}}'s {{ plan.name }} Plan</h2>
        <p><strong>Goal:</strong> {{ plan.goal }}</p>
        <button onclick="viewPlan('{{plan.plan_id}}')">View Plan</button>
        <form action="{{ url_for('main.delete_plan', plan_id=plan.plan_id) }}" method="POST" style="display:inline;">
            <button type="submit" onclick="return confirm('Are you sure you want to delete this plan?')">
                Delete
            </button>
        </form>
    </div>
    {% endfor %}

    {% else %}
    <p>No plans found in the database</p>
    {% endif %}

    <button onclick="addPlan()">Add plan</button>
</body>
</html>
