<!DOCTYPE html>
<html>
<head>
    <title>App</title>
</head>
<body>
    <h1>Users</h1>

    <form method="POST" action="/add">
        <input type="text" name="name" required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for user in users %}
        <li>{{ user.name }}</li>
        {% endfor %}
    </ul>
</body>
</html>
